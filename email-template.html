<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>New RSVP — Layla &amp; Hazem</title>
  <style>
    /* Reset */
    body, table, td, p, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }

    /* Mobile */
    @media only screen and (max-width: 620px) {
      .wrapper    { padding: 20px 12px !important; }
      .container  { width: 100% !important; max-width: 100% !important; }
      .header-pad { padding: 36px 24px 30px !important; }
      .sub-head   { padding: 16px 24px !important; }
      .content    { padding: 32px 24px 28px !important; }
      .footer-pad { padding: 24px 24px !important; }
      .h1         { font-size: 32px !important; }
      .col        { display: block !important; width: 100% !important; padding-right: 0 !important; padding-left: 0 !important; }
      .col + .col { padding-top: 20px !important; }
      .field-val  { font-size: 18px !important; }
      .msg-cell   { font-size: 14px !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#f4f0f8;font-family:Georgia,'Times New Roman',serif;">

<table class="wrapper" width="100%" cellpadding="0" cellspacing="0" border="0"
  style="background-color:#f4f0f8;padding:40px 20px;">
  <tr>
    <td align="center">
      <table class="container" width="600" cellpadding="0" cellspacing="0" border="0"
        style="max-width:600px;width:100%;background-color:#ffffff;border-radius:2px;overflow:hidden;box-shadow:0 4px 40px rgba(0,0,0,0.08);">

        <!-- ── Header ── -->
        <tr>
          <td class="header-pad" style="background-color:#050009;padding:48px 40px 40px;text-align:center;">
            <p style="margin:0 0 6px;font-family:Arial,sans-serif;font-size:10px;letter-spacing:6px;text-transform:uppercase;color:rgba(180,160,210,0.7);">
              Wedding RSVP
            </p>
            <h1 class="h1" style="margin:0;font-family:Georgia,'Times New Roman',serif;font-size:42px;font-weight:400;font-style:italic;color:#ffffff;line-height:1.1;">
              Layla &amp; Hazem
            </h1>
            <p style="margin:12px 0 0;font-family:Arial,sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.3);">
              August 25, 2026 &middot; Dortmund
            </p>
            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-top:28px;">
              <tr>
                <td style="height:1px;background-color:rgba(130,110,175,0.35);font-size:0;line-height:0;">&nbsp;</td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- ── Sub-header ── -->
        <tr>
          <td class="sub-head" style="background-color:#0a0015;padding:18px 40px;text-align:center;">
            <p style="margin:0;font-family:Arial,sans-serif;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:rgba(180,160,210,0.65);">
              New Response Received
            </p>
          </td>
        </tr>

        <!-- ── Body ── -->
        <tr>
          <td class="content" style="padding:44px 40px 36px;background-color:#ffffff;">

            <!-- Guest name -->
            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:24px;">
              <tr>
                <td style="padding-bottom:5px;font-family:Arial,sans-serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:#9b8cb0;">
                  Guest Name
                </td>
              </tr>
              <tr>
                <td class="field-val" style="font-family:Georgia,'Times New Roman',serif;font-size:22px;color:#1a0a28;border-bottom:1px solid #ede8f5;padding-bottom:14px;">
                  {{guest_name}}
                </td>
              </tr>
            </table>

            <!-- Attendance -->
            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:24px;">
              <tr>
                <td style="padding-bottom:5px;font-family:Arial,sans-serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:#9b8cb0;">
                  Attendance
                </td>
              </tr>
              <tr>
                <td style="padding-bottom:14px;border-bottom:1px solid #ede8f5;">
                  <span style="display:inline-block;font-family:Arial,sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:7px 18px;background-color:#050009;color:#ffffff;">
                    {{attending}}
                  </span>
                </td>
              </tr>
            </table>

            <!-- Guests + Phone (2 col → stacks on mobile) -->
            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:24px;">
              <tr>
                <td class="col" width="50%" valign="top"
                  style="padding-right:16px;padding-bottom:14px;border-bottom:1px solid #ede8f5;">
                  <p style="margin:0 0 5px;font-family:Arial,sans-serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:#9b8cb0;">
                    Number of Guests
                  </p>
                  <p class="field-val" style="margin:0;font-family:Georgia,'Times New Roman',serif;font-size:20px;color:#1a0a28;">
                    {{guest_count}}
                  </p>
                </td>
                <td class="col" width="50%" valign="top"
                  style="padding-left:16px;padding-bottom:14px;border-bottom:1px solid #ede8f5;">
                  <p style="margin:0 0 5px;font-family:Arial,sans-serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:#9b8cb0;">
                    Phone
                  </p>
                  <p class="field-val" style="margin:0;font-family:Georgia,'Times New Roman',serif;font-size:20px;color:#1a0a28;">
                    {{guest_phone}}
                  </p>
                </td>
              </tr>
            </table>

            <!-- Email -->
            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:24px;">
              <tr>
                <td style="padding-bottom:5px;font-family:Arial,sans-serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:#9b8cb0;">
                  Email
                </td>
              </tr>
              <tr>
                <td class="field-val" style="font-family:Georgia,'Times New Roman',serif;font-size:18px;color:#3d0e7c;border-bottom:1px solid #ede8f5;padding-bottom:14px;word-break:break-all;">
                  {{guest_email}}
                </td>
              </tr>
            </table>

            <!-- Message -->
            <table width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="padding-bottom:5px;font-family:Arial,sans-serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:#9b8cb0;">
                  Message
                </td>
              </tr>
              <tr>
                <td class="msg-cell" style="font-family:Georgia,'Times New Roman',serif;font-size:16px;font-style:italic;color:#4a3a5c;line-height:1.75;padding:16px 18px;background-color:#f9f6fc;border-left:2px solid #c0a0e8;">
                  {{guest_message}}
                </td>
              </tr>
            </table>

          </td>
        </tr>

        <!-- ── Divider ── -->
        <tr>
          <td style="height:1px;background-color:#c0a0e8;font-size:0;line-height:0;">&nbsp;</td>
        </tr>

        <!-- ── Footer ── -->
        <tr>
          <td class="footer-pad" style="background-color:#050009;padding:28px 40px;text-align:center;">
            <p style="margin:0 0 4px;font-family:Georgia,'Times New Roman',serif;font-size:18px;font-style:italic;color:rgba(255,255,255,0.65);">
              Layla &amp; Hazem
            </p>
            <p style="margin:0;font-family:Arial,sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.2);">
              August 25, 2026 &middot; Dortmund, Germany
            </p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>

</body>
</html>
